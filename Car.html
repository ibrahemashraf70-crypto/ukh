<!DOCTYPE html>

<head>

<div class="container d-flex align-items-center">

  <button class="btn btn-dark btn-sm">Home</button>

    <button class="btn btn-dark btn-sm">Type</button>

</div>

        </div>

          <div class="row mb-5">

            </div>
          
          <div class="col-md-3">

          </div>
          <div class="col-md-3">
            <img src="golf r.webp" class="img-fluid w-100 rounded-3" alt="VW" style="height: 200px;"/>
            <h6 class="mt-3 mb-0">Golf R</h6>
